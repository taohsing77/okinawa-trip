<meta charset="UTF-8">

<title>沖繩 5 日行程</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans GB','PingFang TC',sans-serif;font-size:14px;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;background:#f5f4f0;min-height:100vh;padding-bottom:40px}
.top-bar{padding:20px 16px 0}
.trip-title{font-size:22px;font-weight:600;color:#1a1a1a}
.trip-meta{font-size:13px;color:#888;margin-top:3px}
.hotel-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.hotel-chip{font-size:11px;padding:4px 11px;border-radius:20px;background:#fff;border:1px solid #ddd;color:#555}
.mode-toggle{display:flex;gap:6px;padding:14px 16px 0}
.mode-btn{flex:1;padding:9px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#888;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;font-weight:500}
.mode-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.day-strip{display:flex;gap:7px;padding:14px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#888;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s;font-weight:500}
.day-pill.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.view{display:none;padding:0 16px}
.view.active{display:block}
.alert-box{background:#FEF3C7;border-radius:12px;padding:10px 13px;margin-bottom:10px;font-size:12px;color:#92400E;line-height:1.6;border:1px solid #FDE68A}
.map-btn-row{padding:0 16px;margin-bottom:10px}
.map-btn{width:100%;padding:11px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;text-align:center;display:block;text-decoration:none;font-weight:500}
.cat-legend{display:flex;gap:10px;flex-wrap:wrap;padding:0 16px 14px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zone-label{font-size:11px;font-weight:600;letter-spacing:.04em;color:#aaa;text-transform:uppercase;margin:16px 0 8px;padding-left:2px}
.tl-wrap{position:relative;padding-left:34px}
.tl-line{position:absolute;left:12px;top:10px;bottom:10px;width:1.5px;background:#e0ddd8}
.tl-item{position:relative;margin-bottom:12px}
.tl-badge{position:absolute;left:-34px;top:3px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.tl-card{background:#fff;border:1px solid #ece9e4;border-radius:14px;padding:11px 13px}
.tl-time{font-size:11px;color:#aaa;margin-bottom:3px}
.tl-name{font-size:14px;font-weight:600;color:#1a1a1a;line-height:1.3}
.tl-note{font-size:12px;color:#777;margin-top:5px;line-height:1.6}
.tl-links{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.tl-link{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #e0ddd8;color:#555;text-decoration:none;background:#f9f8f6}
.warn-badge{font-size:11px;padding:3px 9px;border-radius:6px;background:#FEF3C7;color:#92400E;display:inline-block;margin-top:5px;border:1px solid #FDE68A}
.hours-tag{font-size:11px;padding:2px 7px;border-radius:6px;background:#F0FDF4;color:#166534;display:inline-block;margin-top:4px;border:1px solid #BBF7D0}
.cards-grid{display:flex;flex-direction:column;gap:11px}
.place-card{background:#fff;border:1px solid #ece9e4;border-radius:16px;overflow:hidden}
.card-bar{height:3.5px;width:100%}
.card-header{display:flex;align-items:flex-start;gap:10px;padding:11px 13px 0}
.card-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:1px}
.card-time{font-size:11px;color:#aaa;margin-bottom:2px}
.card-name{font-size:15px;font-weight:600;color:#1a1a1a;line-height:1.3}
.card-note{font-size:12px;color:#777;margin:8px 13px 0;padding-top:8px;border-top:1px solid #f0ede8;line-height:1.6;padding-bottom:11px}
.card-links{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.card-link{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #e0ddd8;color:#555;text-decoration:none;background:#f9f8f6}
</style>
</head>

</div>

  curMode=m;
  document.getElementById('btn-tl').classList.toggle('active',m==='timeline');
  document.getElementById('btn-card').classList.toggle('active',m==='cards');
  document.getElementById('tl-view').classList.toggle('active',m==='timeline');
  document.getElementById('card-view').classList.toggle('active',m==='cards');
  renderDay(curDay);
}
function setDay(i){
  curDay=i;
  document.querySelectorAll('.day-pill').forEach((p,j)=>p.classList.toggle('active',j===i));
  renderDay(i);
}

function renderDay(i){
  const day=DAYS[i];
  if(curMode==='timeline'){
    let warns=day.items.filter(it=>it.warn&&it.name).map(it=>`<div class="alert-box">📌 ${it.name}：${it.warn}</div>`).join('');

    // group items by zone
    let groups=[];
    let cur=null;
    day.items.forEach(it=>{
      if(it.zone!==undefined){cur={zone:it.zone,items:[]};groups.push(cur);}
      else{if(!cur){cur={zone:null,items:[]};groups.push(cur);}cur.items.push(it);}
    });

    let num=0;
    let html=groups.map(g=>{
      let zoneHtml=g.zone?`<div class="zone-label">${g.zone}</div>`:'';
      let itemsHtml=g.items.map(it=>{
        num++;
        const c=CAT_COLOR[it.cat]||CAT_COLOR.spot;
        let linksHtml=it.links?'<div class="tl-links">'+it.links.map(l=>`<a class="tl-link" href="${l.u}" target="_blank">${l.t} ↗</a>`).join('')+'</div>':'';
        return `<div class="tl-item">
          <div class="tl-badge" style="background:${c.bg};color:${c.color}">${num}</div>
          <div class="tl-card">
            <div class="tl-time">${it.time} · ${CAT_LABEL[it.cat]}</div>
            <div class="tl-name">${it.name}</div>
            ${it.note?`<div class="tl-note">${it.note}</div>`:''}
            ${it.hours?`<span class="hours-tag">⏰ ${it.hours}</span>`:''}
            ${it.warn?`<span class="warn-badge">${it.warn}</span>`:''}
            ${linksHtml}
          </div>
        </div>`;
      }).join('');
      return `${zoneHtml}<div class="tl-wrap"><div class="tl-line"></div>${itemsHtml}</div>`;
    }).join('');

    document.getElementById('tl-view').innerHTML=warns+html;
  } else {
    let cards=day.items.filter(it=>!it.zone).map((it,idx)=>{
      const c=CAT_COLOR[it.cat]||CAT_COLOR.spot;
      let linksHtml=it.links?'<div class="card-links">'+it.links.map(l=>`<a class="card-link" href="${l.u}" target="_blank">${l.t} ↗</a>`).join('')+'</div>':'';
      return `<div class="place-card">
        <div class="card-bar" style="background:${c.bar}"></div>
        <div class="card-header">
          <div class="card-num" style="background:${c.bg};color:${c.color}">${idx+1}</div>
          <div style="flex:1">
            <div class="card-time">${it.time} · ${CAT_LABEL[it.cat]}</div>
            <div class="card-name">${it.name}</div>
          </div>
        </div>
        <div class="card-note">
          ${it.note||''}
          ${it.hours?`<br><span class="hours-tag" style="margin-top:5px">⏰ ${it.hours}</span>`:''}
          ${it.warn?`<br><span class="warn-badge" style="margin-top:5px">${it.warn}</span>`:''}
          ${linksHtml}
        </div>
      </div>`;
    }).join('');
    document.getElementById('card-view').innerHTML=`<div class="cards-grid">${cards}</div>`;
  }
}

function init(){
  const strip=document.getElementById('day-strip');
  strip.innerHTML=DAYS.map((d,i)=>`<button class="day-pill${i===0?' active':''}" onclick="setDay(${i})">${d.label}</button>`).join('');
  renderDay(0);
}
init();
</script>
</body>
</html>
